name: Build Xiaomi R3 with SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt version'
        required: true
        default: '24.10.5'
        type: choice
        options:
          - '21.02.7'
          - '22.03.7'
          - '23.05.6'
          - '24.10.5'
          - '25.12.0-rc5'
          - 'SNAPSHOT'
      packages:
        description: 'Installed packages'
        required: false
        default: 'apk-mbedtls base-files ca-bundle dnsmasq dropbear firewall4 fstools kmod-gpio-button-hotplug kmod-nft-offload libc libgcc libustream-mbedtls logd mtd netifd nftables odhcp6c odhcpd-ipv6only ppp ppp-mod-pppoe procd-ujail swconfig uboot-envtools uci uclient-fetch urandom-seed urngd wpad-basic-mbedtls kmod-mt76x2 kmod-usb2 kmod-usb-ohci kmod-usb-storage kmod-leds-gpio kmod-usb-ledtrig-usbport luci'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Install ZSTD
      run: |
        sudo apt-get update
        sudo apt-get install -y zstd

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download SDK
      id: download_sdk
      run: |
        VERSION="${{ github.event.inputs.version }}"
        
        if [ "$VERSION" = "SNAPSHOT" ]; then
          BASE_URL="https://downloads.openwrt.org/snapshots/targets/ramips/mt7620"
        else
          BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/ramips/mt7620"
        fi
        
        echo "Checking: $BASE_URL/"
        PAGE_CONTENT=$(curl -s $BASE_URL/)
    
        SDK_FILE=$(echo "$PAGE_CONTENT" | grep -oE 'openwrt-sdk-[^"]*ramips-mt7620[^"]*\.zst' | head -1)
        
        if [ -z "$SDK_FILE" ]; then
          SDK_FILE=$(echo "$PAGE_CONTENT" | grep -oE 'openwrt-sdk-[^"]*ramips-mt7620[^"]*\.tar.xz' | head -1)
        fi
        
        if [ -z "$SDK_FILE" ]; then
          echo "Error: SDK file not found for version $VERSION"
          echo "Available files:"
          echo "$PAGE_CONTENT" | grep -o 'href="[^"]*"' | grep -E 'sdk|imagebuilder' | head -20
          exit 1
        fi
    
        echo "Found SDK file: $SDK_FILE"
        echo "Downloading: $BASE_URL/$SDK_FILE"
        wget -q --show-progress "$BASE_URL/$SDK_FILE"
        
        if [[ "$SDK_FILE" == *.zst ]]; then
          tar -I zstd -xf "$SDK_FILE"
        else
          tar -xf "$SDK_FILE"
        fi
        
        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
        echo "sdk_dir=$SDK_DIR" >> $GITHUB_OUTPUT
        echo "SDK extracted to: $SDK_DIR"

    - name: Setup SDK
      run: |
        cd ${{ steps.download_sdk.outputs.sdk_dir }}
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure build
      run: |
        cd ${{ steps.download_sdk.outputs.sdk_dir }}
        
        cat > .config << EOF
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7620=y
        CONFIG_TARGET_ramips_mt7620_DEVICE_xiaomi_mir3=y
        EOF

        if [ ! -z "${{ github.event.inputs.packages }}" ]; then
          IFS=' ' read -ra PKGS <<< "${{ github.event.inputs.packages }}"
          for pkg in "${PKGS[@]}"; do
            echo "Adding package: $pkg"
            echo "CONFIG_PACKAGE_$pkg=y" >> .config
          done
        fi
        
        cat >> .config << EOF
        CONFIG_DEVEL=y
        CONFIG_CCACHE=y
        CONFIG_AUTOREMOVE=y
        EOF
        
        make defconfig

    - name: Build firmware
      run: |
        cd ${{ steps.download_sdk.outputs.sdk_dir }}
        
        make download -j$(nproc) || make download -j1 V=s
        
        make -j$(nproc) V=s || make -j1 V=s

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        
        if [ -d "${{ steps.download_sdk.outputs.sdk_dir }}/bin/targets" ]; then
          find ${{ steps.download_sdk.outputs.sdk_dir }}/bin/targets/ -name "*.bin" -exec cp {} artifacts/ \;
          find ${{ steps.download_sdk.outputs.sdk_dir }}/bin/targets/ -name "*.manifest" -exec cp {} artifacts/ \;
          find ${{ steps.download_sdk.outputs.sdk_dir }}/bin/targets/ -name "*squashfs*" -exec cp {} artifacts/ \;
        fi
        
        if [ -z "$(ls -A artifacts)" ]; then
          echo "No firmware files found!"
          ls -la ${{ steps.download_sdk.outputs.sdk_dir }}/bin/targets/
          exit 1
        fi
        
        cat > artifacts/build-info.txt << EOF
        ====================================
        Xiaomi Mi Router R3 OpenWrt Build
        ====================================
        OpenWrt Version: ${{ github.event.inputs.version }}
        Build Date: $(date)
        Build ID: ${{ github.run_id }}
        Build Number: ${{ github.run_number }}
        
        Installed Packages:
        ${{ github.event.inputs.packages }}
        
        SDK Directory: ${{ steps.download_sdk.outputs.sdk_dir }}
        GitHub Repository: ${{ github.repository }}
        GitHub Run: ${{ github.run_id }}
        EOF
        
        cd artifacts
        sha256sum *.bin > sha256sums.txt 2>/dev/null || true
        md5sum *.bin > md5sums.txt 2>/dev/null || true

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: xiaomi-r3-${{ github.event.inputs.version }}-${{ github.run_id }}
        path: artifacts/
        retention-days: 30

    - name: Create release
      if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        tag_name: v${{ github.event.inputs.version }}-${{ github.run_number }}
        name: OpenWrt ${{ github.event.inputs.version }} for Xiaomi R3
        body: |
          ## OpenWrt for Xiaomi Mi Router R3
          
          **Version:** ${{ github.event.inputs.version }}
          **Data Build:** $(date)
          
          ### Installed packages: ${{ github.event.inputs.packages }}
          
          ### Installation instructions:
          1. Download the firmware file (file with the .bin extension)
          2. Log in to the router's web interface.
          3. Go to System → Backup/Firmware.
          4. Select the file and click Flash Image.
          
          ### Important:
          - Do not turn off the power during the firmware update.
          - Perform a factory reset after the update.
          
          ### Checksums:
          SHA256: см. файл sha256sums.txt
          draft: false
          prerelease: ${{ github.event.inputs.version == 'SNAPSHOT' || contains(github.event.inputs.version, 'rc') }}
