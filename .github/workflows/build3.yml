name: Build OpenWrt for Xiaomi Mi Router 3

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt version'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - '21.02.7'
          - '22.03.7'
          - '23.05.6'
          - '24.10.5'
          - '25.12.0'
          - '25.12.0-rc5'
          - 'snapshot'
      source:
        description: 'Source repository'
        required: true
        default: 'openwrt'
        type: choice
        options:
          - 'openwrt'
          - 'x-wrt'
      packages:
        description: 'Installed packages'
        required: false
        default: 'apk-mbedtls base-files ca-bundle dnsmasq dropbear firewall4 fstools kmod-gpio-button-hotplug kmod-nft-offload libc libgcc libustream-mbedtls logd mtd netifd nftables odhcp6c odhcpd-ipv6only ppp ppp-mod-pppoe procd-ujail swconfig uboot-envtools uci uclient-fetch urandom-seed urngd wpad-basic-mbedtls kmod-mt76x2 kmod-usb2 kmod-usb-ohci kmod-usb-storage kmod-leds-gpio kmod-usb-ledtrig-usbport luci'

env:
  REPO_URL: ${{ github.event.inputs.source == 'x-wrt' && 'https://github.com/x-wrt/x-wrt.git' || 'https://github.com/openwrt/openwrt.git' }}
  REPO_BRANCH: ${{ github.event.inputs.source == 'x-wrt' && 'master' || format('v{0}', github.event.inputs.version) }}
  XWRT_GIT: "https://github.com/x-wrt/x-wrt.git"
  TZ: Asia/Novosibirsk

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
          file wget zstd
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source
      run: |
        git clone $REPO_URL --branch $REPO_BRANCH --depth 1 openwrt
        cd openwrt
        
        if [ "${{ github.event.inputs.source }}" = "x-wrt" ]; then
          git fetch --depth 1 origin 9c22117b44fec4bb191ac34aa6913b18ee44683c
          git checkout 9c22117b44fec4bb191ac34aa6913b18ee44683c
        fi

    - name: Get X-WRT files for R3
      run: |
        mkdir -p xwrt-files
        cd xwrt-files
        
        FILES=(
          "target/linux/ramips/dts/mt7620a_xiaomi_mi-router-3.dts"
          "target/linux/ramips/files/drivers/mtd/maps/ralink_nand.c"
          "target/linux/ramips/files/drivers/mtd/maps/ralink_nand.h"
          "target/linux/ramips/patches-6.12/0038-mtd-ralink-add-mt7620-nand-driver.patch"
          "target/linux/ramips/image/mt7620.mk"
          "target/linux/ramips/mt7620/base-files/etc/board.d/02_network"
          "target/linux/ramips/mt7620/base-files/lib/upgrade/platform.sh"
          "target/linux/ramips/mt7620/config-6.12"
          "target/linux/ramips/mt7620/target.mk"
          "package/boot/uboot-envtools/files/ramips"
        )
        
        for file in "${FILES[@]}"; do
          mkdir -p $(dirname $file)
          wget -q $XWRT_GIT/raw/master/$file -O $file || echo "Failed to download $file"
        done

    - name: Apply R3 support
      run: |
        cd openwrt
        cp -r ../xwrt-files/* ./
        sed -i 's/grep .vermagic | .*md5sum/echo "c9cccc93bbbebb11be8c7da55273767b"/' include/kernel-defaults.mk
        
        if [ "${{ github.event.inputs.source }}" = "openwrt" ]; then
          rm -f feeds.conf.default
          VERSION="${{ github.event.inputs.version }}"
          if [ "$VERSION" = "SNAPSHOT" ]; then
            wget https://downloads.openwrt.org/snapshots/targets/ramips/mt7620/feeds.buildinfo -O feeds.conf.default
          else
            wget https://downloads.openwrt.org/releases/$VERSION/targets/ramips/mt7620/feeds.buildinfo -O feeds.conf.default
          fi
        fi

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure
      run: |
        cd openwrt
        
        VERSION="${{ github.event.inputs.version }}"
        if [ "$VERSION" = "SNAPSHOT" ]; then
          wget https://downloads.openwrt.org/snapshots/targets/ramips/mt7620/config.buildinfo -O .config
        else
          wget https://downloads.openwrt.org/releases/$VERSION/targets/ramips/mt7620/config.buildinfo -O .config
        fi
        
        sed -i '/CONFIG_TARGET_MULTI_PROFILE/d' .config
        sed -i '/CONFIG_TARGET_ALL_PROFILES/d' .config
        sed -i '/CONFIG_TARGET_PER_DEVICE_ROOTFS/d' .config
        sed -i '/CONFIG_TARGET_DEVICE_/d' .config
        
        cat >> .config << EOF
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7620=y
        CONFIG_TARGET_ramips_mt7620_DEVICE_xiaomi_mi-router-3=y
        CONFIG_TARGET_PROFILE="DEVICE_xiaomi_mi-router-3"
        EOF
        
        if [ ! -z "${{ github.event.inputs.packages }}" ]; then
          for pkg in ${{ github.event.inputs.packages }}; do
            echo "CONFIG_PACKAGE_$pkg=y" >> .config
          done
        fi
        
        cat >> .config << EOF
        CONFIG_MTD_NAND_MT7620=y
        CONFIG_MTD_UBI=y
        CONFIG_PACKAGE_kmod-nand=y
        EOF
        
        make defconfig

    - name: Download
      run: |
        cd openwrt
        make download -j$(nproc) || make download -j1 V=s

    - name: Build
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        find openwrt/bin/targets/ -name "*.bin" -exec cp {} artifacts/ \;
        find openwrt/bin/targets/ -name "*.manifest" -exec cp {} artifacts/ \;
        
        cat > artifacts/build-info.txt << EOF
        Xiaomi Mi Router 3 Firmware
        ===========================
        Source: ${{ github.event.inputs.source }}
        Version: ${{ github.event.inputs.version }}
        Build Date: $(date)
        Build ID: ${{ github.run_id }}

        Packages: ${{ github.event.inputs.packages }}

        This firmware includes patches from X-WRT for NAND support.
        EOF
        
        cd artifacts
        sha256sum *.bin > sha256sums.txt 2>/dev/null || true

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: xiaomi-r3-${{ github.event.inputs.source }}-${{ github.event.inputs.version }}
        path: artifacts/

    - name: Create release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        tag_name: ${{ github.event.inputs.source }}-${{ github.event.inputs.version }}-${{ github.run_number }}
        name: Xiaomi R3 - ${{ github.event.inputs.source }} ${{ github.event.inputs.version }}
        body: |
          ## Xiaomi Mi Router 3 Firmware
          
          **Source:** ${{ github.event.inputs.source }}
          **Version:** ${{ github.event.inputs.version }}
          
          ### Features:
          - Full NAND support (128MiB)
          - MT7620A + MT7612E WiFi
          - USB 2.0 support
          - Based on X-WRT patches
          
          ### Included packages: ${{ github.event.inputs.packages }}
          ### Installation:
          1. Use Breed bootloader or official recovery
          2. Flash factory.bin or sysupgrade.bin
          3. First boot may take up to 2 minutes
